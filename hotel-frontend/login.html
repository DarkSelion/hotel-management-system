<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hotel Management System - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f0f2f5;
    }
    .login-card {
      max-width: 420px;
      margin: 100px auto;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    .card-header {
      background-color: #0d6efd;
      color: white;
      text-align: center;
      padding: 24px;
      border-radius: 12px 12px 0 0;
    }
  </style>
</head>
<body>

<div class="card login-card">
  <div class="card-header">
    <h4 class="mb-0">🏨 Hotel Management System</h4>
    <small>Please sign in to continue</small>
  </div>
  <div class="card-body p-4">
    <div id="errorMsg" class="alert alert-danger d-none"></div>
    <div class="mb-3">
      <label class="form-label">Email address</label>
      <input type="email" id="email" class="form-control" placeholder="admin@hotel.com">
    </div>
    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" id="password" class="form-control" placeholder="Enter password">
    </div>
    <button onclick="login()" class="btn btn-primary w-100">Sign In</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const API = 'http://192.168.100.60:3000';

  async function login() {
    const email    = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const errorMsg = document.getElementById('errorMsg');

    if (!email || !password) {
      errorMsg.textContent = 'Please enter email and password.';
      errorMsg.classList.remove('d-none');
      return;
    }

    try {
      const response = await fetch(`${API}/api/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      const data = await response.json();

      if (response.ok) {
        // Save token and user info
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        // Redirect to dashboard
        window.location.href = 'dashboard.html';
      } else {
        errorMsg.textContent = data.message;
        errorMsg.classList.remove('d-none');
      }
    } catch (err) {
      errorMsg.textContent = 'Cannot connect to server. Make sure backend is running.';
      errorMsg.classList.remove('d-none');
    }
  }

  // Allow pressing Enter to login
  document.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') login();
  });
</script>

</body>
</html>
