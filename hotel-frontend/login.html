<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hotel SPCF - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-body">

<div class="login-wrapper">
  <div class="login-brand">
    <h3>🏨 Hotel SPCF</h3>
    <p>Staff Portal — Sign in to continue</p>
  </div>
  <div class="login-card">
    <h5>Welcome back</h5>
    <div class="sub">Sign in to your account to continue</div>
    <div id="errorMsg" class="alert alert-danger d-none"></div>
    <div class="mb-3">
      <label class="form-label">Email Address</label>
      <input type="email" id="email" class="form-control" placeholder="admin@hotel.com">
    </div>
    <div class="mb-4">
      <label class="form-label">Password</label>
      <input type="password" id="password" class="form-control" placeholder="Enter your password">
    </div>
    <button class="btn-login" onclick="login()">Sign In</button>
  </div>
  <div class="guest-link">
    <a href="reservation.html">Want to book a room? Reserve here →</a>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
