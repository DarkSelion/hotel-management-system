<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hotel SPCF - Sign Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-body">

<div class="login-wrapper">
  <div class="login-brand">
    <h3>Hotel SPCF</h3>
    <p>Create your guest account</p>
  </div>
  <div class="login-card">
    <h5>Join as a guest</h5>
    <div class="sub">Sign up to manage your bookings</div>
    <div id="errorMsg" class="alert alert-danger d-none"></div>
    <div id="successMsg" class="alert alert-success d-none"></div>
    <div class="mb-3">
      <label class="form-label">Full Name</label>
      <input type="text" id="name" class="form-control" placeholder="Juan dela Cruz">
    </div>
    <div class="mb-3">
      <label class="form-label">Email Address</label>
      <input type="email" id="email" class="form-control" placeholder="juan@email.com">
    </div>
    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" id="password" class="form-control" placeholder="Create a password">
    </div>
    <div class="mb-3">
      <label class="form-label">Phone</label>
      <input type="text" id="phone" class="form-control" placeholder="09171234567">
    </div>
    <div class="mb-4">
      <label class="form-label">Address</label>
      <input type="text" id="address" class="form-control" placeholder="Manila, Philippines">
    </div>
    <button class="btn-login" onclick="signup()">Create Account</button>
    <div style="text-align:center;margin-top:18px;">
      <a href="login.html" style="color:#6366f1;font-size:0.85rem;text-decoration:none;font-weight:600;">
        Already have an account? Sign in
      </a>
    </div>
  </div>

</div>

<script src="js/config.js"></script>
<script>
async function signup() {
  const name     = document.getElementById('name').value.trim();
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value.trim();
  const phone    = document.getElementById('phone').value.trim();
  const address  = document.getElementById('address').value.trim();
  const errorMsg = document.getElementById('errorMsg');
  const successMsg = document.getElementById('successMsg');
  errorMsg.classList.add('d-none');
  successMsg.classList.add('d-none');

  if (!name || !email || !password) {
    errorMsg.textContent = 'Name, email, and password are required.';
    errorMsg.classList.remove('d-none');
    return;
  }

  try {
    const res = await fetch(`${API}/api/auth/guest/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password, phone, address })
    });
    const data = await res.json();
    if (res.ok) {
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));
      window.location.href = 'dashboard.html';
    } else {
      errorMsg.textContent = data.message;
      errorMsg.classList.remove('d-none');
    }
  } catch (err) {
    errorMsg.textContent = 'Cannot connect to server. Make sure backend is running.';
    errorMsg.classList.remove('d-none');
  }
}

document.addEventListener('keypress', e => {
  if (e.key === 'Enter') signup();
});
</script>
</body>
</html>
