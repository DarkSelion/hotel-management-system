<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reservations - Hotel Management System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f0f2f5; }
    .sidebar {
      min-height: 100vh;
      background-color: #0d6efd;
      color: white;
      padding: 20px;
    }
    .sidebar a {
      color: white;
      text-decoration: none;
      display: block;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 4px;
    }
    .sidebar a:hover { background-color: rgba(255,255,255,0.2); }
    .sidebar a.active { background-color: rgba(255,255,255,0.3); }
  </style>
</head>
<body>

<div class="container-fluid">
  <div class="row">

    <!-- Sidebar -->
    <div class="col-md-2 sidebar">
      <h5 class="mb-4">🏨 HMS</h5>
      <a href="dashboard.html">📊 Dashboard</a>
      <a href="rooms.html">🛏️ Rooms</a>
      <a href="reservations.html" class="active">📋 Reservations</a>
      <a href="payments.html">💳 Payments</a>
      <hr style="border-color: rgba(255,255,255,0.3)">
      <a href="#" onclick="logout()">🚪 Logout</a>
    </div>

    <!-- Main Content -->
    <div class="col-md-10 p-4">
      <h4 class="mb-4">📋 Reservations</h4>

      <!-- Create Reservation -->
      <div class="card border-0 shadow-sm mb-4">
        <div class="card-header bg-white fw-bold">Create New Reservation</div>
        <div class="card-body">

          <!-- Step 1: Select Dates and Search -->
          <div class="row g-3 mb-3">
            <div class="col-md-12">
              <h6 class="text-muted">Step 1 — Select Dates</h6>
            </div>
            <div class="col-md-3">
              <label class="form-label">Check In Date</label>
              <input type="date" id="newCheckIn" class="form-control">
            </div>
            <div class="col-md-3">
              <label class="form-label">Check Out Date</label>
              <input type="date" id="newCheckOut" class="form-control">
            </div>
            <div class="col-md-3 d-flex align-items-end">
              <button onclick="searchRooms()" class="btn btn-outline-primary w-100">
                Search Available Rooms
              </button>
            </div>
          </div>

          <!-- Step 2: Select Room -->
          <div class="row g-3 mb-3">
            <div class="col-md-12">
              <h6 class="text-muted">Step 2 — Select Room</h6>
            </div>
            <div class="col-md-6">
              <select id="roomSelect" class="form-select">
                <option value="">-- Search available rooms first --</option>
              </select>
            </div>
          </div>

          <!-- Step 3: Guest Details -->
          <div class="row g-3 mb-3">
            <div class="col-md-12">
              <h6 class="text-muted">Step 3 — Guest Details</h6>
            </div>
            <div class="col-md-3">
              <label class="form-label">First Name</label>
              <input type="text" id="firstName" class="form-control" placeholder="Juan">
            </div>
            <div class="col-md-3">
              <label class="form-label">Last Name</label>
              <input type="text" id="lastName" class="form-control" placeholder="dela Cruz">
            </div>
            <div class="col-md-3">
              <label class="form-label">Phone</label>
              <input type="text" id="phone" class="form-control" placeholder="09171234567">
            </div>
            <div class="col-md-3">
              <label class="form-label">Email</label>
              <input type="email" id="guestEmail" class="form-control" placeholder="juan@email.com">
            </div>
            <div class="col-md-6">
              <label class="form-label">Address</label>
              <input type="text" id="address" class="form-control" placeholder="Manila, Philippines">
            </div>
          </div>

          <!-- Cost Preview -->
          <div id="costPreview" class="alert alert-info d-none mb-3"></div>
          <div id="createMsg" class="mb-2"></div>

          <button onclick="createReservation()" class="btn btn-success">
            Create Reservation
          </button>
        </div>
      </div>

      <!-- All Reservations Table -->
      <div class="card border-0 shadow-sm">
        <div class="card-header bg-white fw-bold">All Reservations</div>
        <div class="card-body p-0">
          <table class="table table-hover mb-0">
            <thead class="table-light">
              <tr>
                <th>#</th>
                <th>Guest</th>
                <th>Room</th>
                <th>Check In</th>
                <th>Check Out</th>
                <th>Amount</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="reservationsTable">
              <tr><td colspan="8" class="text-center py-3">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const API   = 'http://192.168.100.60:3000';
  const token = localStorage.getItem('token');
  const user  = JSON.parse(localStorage.getItem('user') || '{}');

  if (!token) window.location.href = 'login.html';

  // Set default dates
  const today    = new Date().toISOString().split('T')[0];
  const tomorrow = new Date(Date.now() + 86400000).toISOString().split('T')[0];
  document.getElementById('newCheckIn').value  = today;
  document.getElementById('newCheckOut').value = tomorrow;

  async function searchRooms() {
    const checkIn  = document.getElementById('newCheckIn').value;
    const checkOut = document.getElementById('newCheckOut').value;

    if (!checkIn || !checkOut) {
      alert('Please select both dates.');
      return;
    }

    try {
      const res  = await fetch(
        `${API}/api/rooms/availability?check_in_date=${checkIn}&check_out_date=${checkOut}`
      );
      const data = await res.json();

      const select = document.getElementById('roomSelect');

      if (!data.rooms || data.rooms.length === 0) {
        select.innerHTML = '<option value="">No available rooms for selected dates</option>';
        document.getElementById('costPreview').classList.add('d-none');
        return;
      }

      select.innerHTML = '<option value="">-- Select a room --</option>' +
        data.rooms.map(r => `
          <option value="${r.id}"
            data-price="${r.base_price}"
            data-total="${r.estimated_total}"
            data-nights="${r.nights}"
            data-type="${r.room_type}">
            Room ${r.room_number} — ${r.room_type} — 
            ₱${parseFloat(r.base_price).toLocaleString()}/night
          </option>
        `).join('');

      // Show cost preview when room is selected
      select.onchange = function() {
        const opt = this.options[this.selectedIndex];
        if (!opt.value) {
          document.getElementById('costPreview').classList.add('d-none');
          return;
        }
        const nights = opt.dataset.nights;
        const price  = parseFloat(opt.dataset.price).toLocaleString();
        const total  = parseFloat(opt.dataset.total);
        const tax    = (total * 0.12 / 1.12).toFixed(2);
        document.getElementById('costPreview').innerHTML = `
          <strong>Cost Summary:</strong>
          ${nights} night(s) × ₱${price} = 
          ₱${(parseFloat(opt.dataset.total) / 1.12).toFixed(2)} subtotal + 
          ₱${parseFloat(tax).toLocaleString()} tax = 
          <strong>₱${parseFloat(opt.dataset.total).toLocaleString()} total</strong>
        `;
        document.getElementById('costPreview').classList.remove('d-none');
      };

    } catch (err) {
      alert('Error searching rooms.');
    }
  }

  async function createReservation() {
    const room_id        = document.getElementById('roomSelect').value;
    const check_in_date  = document.getElementById('newCheckIn').value;
    const check_out_date = document.getElementById('newCheckOut').value;
    const first_name     = document.getElementById('firstName').value;
    const last_name      = document.getElementById('lastName').value;
    const phone          = document.getElementById('phone').value;
    const email          = document.getElementById('guestEmail').value;
    const address        = document.getElementById('address').value;
    const msgDiv         = document.getElementById('createMsg');

    if (!room_id || !first_name || !last_name) {
      msgDiv.innerHTML = '<div class="alert alert-warning">Please fill in all required fields and select a room.</div>';
      return;
    }

    try {
      const res  = await fetch(`${API}/api/reservations`, {
        method:  'POST',
        headers: {
          'Content-Type':  'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({
          first_name, last_name, phone, email,
          address, room_id, check_in_date, check_out_date
        })
      });
      const data = await res.json();

      if (res.ok) {
        msgDiv.innerHTML = `
          <div class="alert alert-success">
            ✅ Reservation #${data.reservation_id} created for 
            ${data.guest.first_name} ${data.guest.last_name} — 
            Room ${data.room_number} — 
            Total: ₱${parseFloat(data.total_amount).toLocaleString()}
          </div>`;
        loadReservations();
        // Clear form
        document.getElementById('firstName').value  = '';
        document.getElementById('lastName').value   = '';
        document.getElementById('phone').value      = '';
        document.getElementById('guestEmail').value = '';
        document.getElementById('address').value    = '';
        document.getElementById('roomSelect').innerHTML =
          '<option value="">-- Search available rooms first --</option>';
        document.getElementById('costPreview').classList.add('d-none');
      } else {
        msgDiv.innerHTML = `<div class="alert alert-danger">${data.message}</div>`;
      }
    } catch (err) {
      msgDiv.innerHTML = '<div class="alert alert-danger">Server error.</div>';
    }
  }

  async function loadReservations() {
    try {
      const res   = await fetch(`${API}/api/reservations`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const list  = await res.json();
      const tbody = document.getElementById('reservationsTable');

      if (list.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="text-center py-3">No reservations yet.</td></tr>';
        return;
      }

      tbody.innerHTML = list.map(r => `
        <tr>
          <td>${r.id}</td>
          <td>${r.guest_name}<br>
            <small class="text-muted">${r.email || ''}</small>
          </td>
          <td>${r.room_number}<br>
            <small class="text-muted">${r.room_type}</small>
          </td>
          <td>${new Date(r.check_in_date).toLocaleDateString()}</td>
          <td>${new Date(r.check_out_date).toLocaleDateString()}</td>
          <td>₱${parseFloat(r.total_amount).toLocaleString()}</td>
          <td><span class="badge ${getBadgeColor(r.status)}">${r.status}</span></td>
          <td>
            ${r.status === 'Booked' ? `
              <button class="btn btn-sm btn-success mb-1" onclick="checkIn(${r.id})">
                Check In
              </button>
              <button class="btn btn-sm btn-danger mb-1" onclick="cancelReservation(${r.id})">
                Cancel
              </button>` : ''}
            ${r.status === 'Checked In' ? `
              <button class="btn btn-sm btn-secondary" onclick="checkOut(${r.id})">
                Check Out
              </button>` : ''}
            ${r.status === 'Checked Out' || r.status === 'Cancelled' ?
              '<span class="text-muted small">No actions</span>' : ''}
          </td>
        </tr>
      `).join('');
    } catch (err) {
      console.error('Load reservations error:', err);
    }
  }

  async function checkIn(id) {
    if (!confirm('Check in this guest?')) return;
    try {
      const res  = await fetch(`${API}/api/reservations/${id}/checkin`, {
        method:  'PATCH',
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const data = await res.json();
      alert(data.message);
      loadReservations();
    } catch (err) {
      alert('Server error.');
    }
  }

  async function checkOut(id) {
    if (!confirm('Check out this guest?')) return;
    try {
      const res  = await fetch(`${API}/api/reservations/${id}/checkout`, {
        method:  'PATCH',
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const data = await res.json();
      alert(data.message);
      loadReservations();
    } catch (err) {
      alert('Server error.');
    }
  }

  async function cancelReservation(id) {
    if (!confirm('Are you sure you want to cancel this reservation?')) return;
    try {
      const res  = await fetch(`${API}/api/reservations/${id}/cancel`, {
        method:  'PATCH',
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const data = await res.json();
      alert(data.message);
      loadReservations();
    } catch (err) {
      alert('Server error.');
    }
  }

  function getBadgeColor(status) {
    const colors = {
      'Booked':      'bg-primary',
      'Checked In':  'bg-success',
      'Checked Out': 'bg-secondary',
      'Cancelled':   'bg-danger'
    };
    return colors[status] || 'bg-secondary';
  }

  function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    window.location.href = 'login.html';
  }

  loadReservations();
</script>

</body>
</html>
