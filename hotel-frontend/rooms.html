<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rooms - Hotel SPCF</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
</head>
<body style="display:none;">

<div class="sidebar">
  <div class="sidebar-brand">
    <h4>Hotel SPCF</h4>
    <p id="sidebarRole"></p>
  </div>
  <div class="sidebar-menu" id="sidebarMenu"></div>
</div>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<div class="main-content">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:12px;">
      <button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
      <h5>Room Management</h5>
    </div>
    <span class="user-badge" id="welcomeMsg"></span>
  </div>
  <div class="content-area">

    <!-- Availability Search -->
    <div class="section-title">Check Availability</div>
    <div class="card-custom">
      <div class="card-head"><h6>Search Available Rooms</h6></div>
      <div class="card-body-custom">
        <div class="row g-3">
          <div class="col-md-4">
            <label class="form-label">Check In Date</label>
            <div class="date-picker-wrapper">
              <div class="date-display" onclick="openCalendar('checkin')">
                <span id="checkinDisplay" class="placeholder">Select date</span>
                <span style="font-size:0.8rem;">▼</span>
              </div>
              <div class="calendar-popup" id="calCheckin"></div>
            </div>
            <input type="hidden" id="checkinValue">
          </div>
          <div class="col-md-4">
            <label class="form-label">Check Out Date</label>
            <div class="date-picker-wrapper">
              <div class="date-display" onclick="openCalendar('checkout')">
                <span id="checkoutDisplay" class="placeholder">Select date</span>
                <span style="font-size:0.8rem;">▼</span>
              </div>
              <div class="calendar-popup" id="calCheckout"></div>
            </div>
            <input type="hidden" id="checkoutValue">
          </div>
          <div class="col-md-2">
            <label class="form-label">Room Type</label>
            <select id="roomTypeFilter" class="form-select">
              <option value="">All Types</option>
              <option value="1">Standard</option>
              <option value="2">Deluxe</option>
              <option value="3">Suite</option>
            </select>
          </div>
          <div class="col-md-2 d-flex align-items-end">
            <button class="btn-primary-dark w-100" onclick="checkAvailability()">Search</button>
          </div>
        </div>
        <div id="availabilityResult" class="mt-3"></div>
      </div>
    </div>

    <!-- Add Room -->
    <div class="section-title">Add New Room</div>
    <div class="card-custom">
      <div class="card-head"><h6>Add Room</h6></div>
      <div class="card-body-custom">
        <div class="row g-3">
          <div class="col-md-3">
            <label class="form-label">Room Number</label>
            <input type="text" id="roomNumber" class="form-control" placeholder="e.g. 106">
          </div>
          <div class="col-md-3">
            <label class="form-label">Room Type</label>
            <select id="roomType" class="form-select">
              <option value="1">Standard</option>
              <option value="2">Deluxe</option>
              <option value="3">Suite</option>
            </select>
          </div>
          <div class="col-md-3">
            <label class="form-label">Floor</label>
            <input type="number" id="floor" class="form-control" placeholder="e.g. 1">
          </div>
          <div class="col-md-3 d-flex align-items-end">
            <button class="btn-success-dark w-100" onclick="addRoom()">Add Room</button>
          </div>
        </div>
        <div id="addRoomMsg" class="mt-2"></div>
      </div>
    </div>

    <!-- All Rooms Grid -->
    <div class="section-title">All Rooms</div>
    <div class="card-custom">
      <div class="card-head">
        <h6>Room Inventory</h6>
        <div style="display:flex;gap:16px;font-size:0.75rem;color:#64748b;">
          <span><span style="color:#059669;font-weight:700;">●</span> Available</span>
          <span><span style="color:#dc2626;font-weight:700;">●</span> Occupied</span>
          <span><span style="color:#ea580c;font-weight:700;">●</span> Maintenance</span>
        </div>
      </div>
      <div class="card-body-custom">
        <div id="roomsGrid">
          <div class="text-center py-4 text-muted">Loading...</div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Status Modal -->
<div class="modal fade" id="statusModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content" style="border-radius:18px;border:none;box-shadow:0 24px 64px rgba(0,0,0,0.15);">
      <div class="modal-header border-0 pb-0">
        <h6 class="modal-title fw-bold" style="color:#0f172a;">Update Room Status</h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p style="color:#64748b;font-size:0.85rem;">
          Room: <strong id="modalRoomNumber" style="color:#0f172a;"></strong>
        </p>
        <label class="form-label">New Status</label>
        <select id="newStatus" class="form-select">
          <option value="Available">Available</option>
          <option value="Occupied">Occupied</option>
          <option value="Under Maintenance">Under Maintenance</option>
        </select>
      </div>
      <div class="modal-footer border-0">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" style="border-radius:10px;">Cancel</button>
        <button type="button" onclick="updateStatus()" style="background:linear-gradient(135deg,#0f172a,#1e293b);color:white;border:none;border-radius:10px;padding:8px 20px;font-weight:600;cursor:pointer;transition:all 0.2s;" onmouseover="this.style.opacity='0.9'" onmouseout="this.style.opacity='1'">Update</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/config.js"></script>
<script src="js/calendar.js"></script>
<script>
  requireAuth();
  if (getUser().role !== 'Admin') window.location.href = 'dashboard.html';
  setupSidebar('rooms.html');
  setupWelcome();
  document.body.style.display = '';
</script>
<script src="js/rooms.js"></script>
</body>
</html>
