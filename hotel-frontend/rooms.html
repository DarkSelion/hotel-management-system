<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rooms - Hotel SPCF</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>

<div class="sidebar">
  <div class="sidebar-brand">
    <h4>Hotel SPCF</h4>
    <p id="sidebarRole"></p>
  </div>
  <div class="sidebar-menu" id="sidebarMenu"></div>
</div>

<div class="main-content">
  <div class="topbar">
    <h5>Room Management</h5>
    <span class="user-badge" id="welcomeMsg"></span>
  </div>
  <div class="content-area">

    <!-- Availability Search -->
    <div class="section-title">Check Availability</div>
    <div class="card-custom">
      <div class="card-head"><h6>Search Available Rooms</h6></div>
      <div class="card-body-custom">
        <div class="row g-3">
          <div class="col-md-4">
            <label class="form-label">Check In Date</label>
            <div class="date-picker-wrapper">
              <div class="date-display" onclick="openCalendar('checkin')">
                <span id="checkinDisplay" class="placeholder">Select date</span>
                <span>📅</span>
              </div>
              <div class="calendar-popup" id="calCheckin"></div>
            </div>
            <input type="hidden" id="checkinValue">
          </div>
          <div class="col-md-4">
            <label class="form-label">Check Out Date</label>
            <div class="date-picker-wrapper">
              <div class="date-display" onclick="openCalendar('checkout')">
                <span id="checkoutDisplay" class="placeholder">Select date</span>
                <span>📅</span>
              </div>
              <div class="calendar-popup" id="calCheckout"></div>
            </div>
            <input type="hidden" id="checkoutValue">
          </div>
          <div class="col-md-2">
            <label class="form-label">Room Type</label>
            <select id="roomTypeFilter" class="form-select">
              <option value="">All Types</option>
              <option value="1">Standard</option>
              <option value="2">Deluxe</option>
              <option value="3">Suite</option>
            </select>
          </div>
          <div class="col-md-2 d-flex align-items-end">
            <button class="btn-primary-dark w-100" onclick="checkAvailability()">
              Search
            </button>
          </div>
        </div>
        <div id="availabilityResult" class="mt-3"></div>
      </div>
    </div>

    <!-- Add Room -->
    <div class="section-title">Add New Room</div>
    <div class="card-custom">
      <div class="card-head"><h6>Add Room</h6></div>
      <div class="card-body-custom">
        <div class="row g-3">
          <div class="col-md-3">
            <label class="form-label">Room Number</label>
            <input type="text" id="roomNumber" class="form-control" placeholder="e.g. 103">
          </div>
          <div class="col-md-3">
            <label class="form-label">Room Type</label>
            <select id="roomType" class="form-select">
              <option value="1">Standard</option>
              <option value="2">Deluxe</option>
              <option value="3">Suite</option>
            </select>
          </div>
          <div class="col-md-3">
            <label class="form-label">Floor</label>
            <input type="number" id="floor" class="form-control" placeholder="e.g. 1">
          </div>
          <div class="col-md-3 d-flex align-items-end">
            <button class="btn-success-dark w-100" onclick="addRoom()">
              Add Room
            </button>
          </div>
        </div>
        <div id="addRoomMsg" class="mt-2"></div>
      </div>
    </div>

    <!-- All Rooms -->
    <div class="section-title">All Rooms</div>
    <div class="table-card">
      <div class="table-header">
        <h6>Room Inventory</h6>
      </div>
      <div class="table-responsive">
        <table class="table mb-0">
          <thead>
            <tr>
              <th>#</th>
              <th>Room</th>
              <th>Floor</th>
              <th>Type</th>
              <th>Price / Night</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="roomsTable">
            <tr>
              <td colspan="7" class="text-center py-4 text-muted">Loading...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<!-- Status Modal -->
<div class="modal fade" id="statusModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content" style="border-radius:16px;border:none;">
      <div class="modal-header border-0 pb-0">
        <h6 class="modal-title fw-bold">Update Room Status</h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p style="color:#64748b;font-size:0.85rem;">
          Room: <strong id="modalRoomNumber"></strong>
        </p>
        <label class="form-label">New Status</label>
        <select id="newStatus" class="form-select">
          <option value="Available">Available</option>
          <option value="Occupied">Occupied</option>
          <option value="Under Maintenance">Under Maintenance</option>
        </select>
      </div>
      <div class="modal-footer border-0">
        <button type="button" class="btn btn-secondary"
          data-bs-dismiss="modal" style="border-radius:10px;">
          Cancel
        </button>
        <button type="button" class="btn btn-primary"
          onclick="updateStatus()"
          style="border-radius:10px;background:#1a1a2e;border:none;">
          Update
        </button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/config.js"></script>
<script src="js/calendar.js"></script>
<script>
  requireAuth();
  if (getUser().role !== 'Admin') window.location.href = 'dashboard.html';
  setupSidebar('rooms.html');
  setupWelcome();
</script>
<script src="js/rooms.js"></script>
</body>
</html>
