<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rooms - Hotel Management System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f0f2f5; }
    .sidebar {
      min-height: 100vh;
      background-color: #0d6efd;
      color: white;
      padding: 20px;
    }
    .sidebar a {
      color: white;
      text-decoration: none;
      display: block;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 4px;
    }
    .sidebar a:hover { background-color: rgba(255,255,255,0.2); }
    .sidebar a.active { background-color: rgba(255,255,255,0.3); }
  </style>
</head>
<body>

<div class="container-fluid">
  <div class="row">

    <!-- Sidebar -->
    <div class="col-md-2 sidebar">
      <h5 class="mb-4">🏨 HMS</h5>
      <a href="dashboard.html">📊 Dashboard</a>
      <a href="rooms.html" class="active">🛏️ Rooms</a>
      <a href="reservations.html">📋 Reservations</a>
      <a href="payments.html">💳 Payments</a>
      <hr style="border-color: rgba(255,255,255,0.3)">
      <a href="#" onclick="logout()">🚪 Logout</a>
    </div>

    <!-- Main Content -->
    <div class="col-md-10 p-4">
      <h4 class="mb-4">🛏️ Room Management</h4>

      <!-- Availability Search -->
      <div class="card border-0 shadow-sm mb-4">
        <div class="card-header bg-white fw-bold">Check Room Availability</div>
        <div class="card-body">
          <div class="row g-3">
            <div class="col-md-3">
              <label class="form-label">Check In Date</label>
              <input type="date" id="checkIn" class="form-control">
            </div>
            <div class="col-md-3">
              <label class="form-label">Check Out Date</label>
              <input type="date" id="checkOut" class="form-control">
            </div>
            <div class="col-md-3">
              <label class="form-label">Room Type (Optional)</label>
              <select id="roomTypeFilter" class="form-select">
                <option value="">All Types</option>
                <option value="1">Standard</option>
                <option value="2">Deluxe</option>
                <option value="3">Suite</option>
              </select>
            </div>
            <div class="col-md-3 d-flex align-items-end">
              <button onclick="checkAvailability()" class="btn btn-primary w-100">
                Search Available Rooms
              </button>
            </div>
          </div>
          <div id="availabilityResult" class="mt-3"></div>
        </div>
      </div>

      <!-- Add Room (Admin only) -->
      <div class="card border-0 shadow-sm mb-4" id="addRoomCard">
        <div class="card-header bg-white fw-bold">Add New Room</div>
        <div class="card-body">
          <div class="row g-3">
            <div class="col-md-3">
              <label class="form-label">Room Number</label>
              <input type="text" id="roomNumber" class="form-control" placeholder="e.g. 103">
            </div>
            <div class="col-md-3">
              <label class="form-label">Room Type</label>
              <select id="roomType" class="form-select">
                <option value="1">Standard</option>
                <option value="2">Deluxe</option>
                <option value="3">Suite</option>
              </select>
            </div>
            <div class="col-md-3">
              <label class="form-label">Floor</label>
              <input type="number" id="floor" class="form-control" placeholder="e.g. 1">
            </div>
            <div class="col-md-3 d-flex align-items-end">
              <button onclick="addRoom()" class="btn btn-success w-100">Add Room</button>
            </div>
          </div>
          <div id="addRoomMsg" class="mt-2"></div>
        </div>
      </div>

      <!-- All Rooms Table -->
      <div class="card border-0 shadow-sm">
        <div class="card-header bg-white fw-bold">All Rooms</div>
        <div class="card-body p-0">
          <table class="table table-hover mb-0">
            <thead class="table-light">
              <tr>
                <th>#</th>
                <th>Room Number</th>
                <th>Floor</th>
                <th>Type</th>
                <th>Price/Night</th>
                <th>Status</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="roomsTable">
              <tr><td colspan="7" class="text-center py-3">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Update Status Modal -->
<div class="modal fade" id="statusModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Update Room Status</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p>Room: <strong id="modalRoomNumber"></strong></p>
        <label class="form-label">New Status</label>
        <select id="newStatus" class="form-select">
          <option value="Available">Available</option>
          <option value="Occupied">Occupied</option>
          <option value="Under Maintenance">Under Maintenance</option>
        </select>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" onclick="updateStatus()">Update</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const API   = 'http://192.168.100.60:3000';
  const token = localStorage.getItem('token');
  const user  = JSON.parse(localStorage.getItem('user') || '{}');

  if (!token) window.location.href = 'login.html';

  // Hide Add Room if not Admin
  if (user.role !== 'Admin') {
    document.getElementById('addRoomCard').style.display = 'none';
  }

  let selectedRoomId = null;

  // Set default dates to today and tomorrow
  const today    = new Date().toISOString().split('T')[0];
  const tomorrow = new Date(Date.now() + 86400000).toISOString().split('T')[0];
  document.getElementById('checkIn').value  = today;
  document.getElementById('checkOut').value = tomorrow;

  async function loadRooms() {
    try {
      const res   = await fetch(`${API}/api/rooms`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const rooms = await res.json();

      const tbody = document.getElementById('roomsTable');
      if (rooms.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="text-center">No rooms found.</td></tr>';
        return;
      }

      tbody.innerHTML = rooms.map(r => `
        <tr>
          <td>${r.id}</td>
          <td><strong>${r.room_number}</strong></td>
          <td>Floor ${r.floor}</td>
          <td>${r.room_type}</td>
          <td>₱${parseFloat(r.base_price).toLocaleString()}</td>
          <td><span class="badge ${getStatusColor(r.status)}">${r.status}</span></td>
          <td>
            <button class="btn btn-sm btn-outline-primary"
              onclick="openStatusModal(${r.id}, '${r.room_number}', '${r.status}')">
              Update Status
            </button>
          </td>
        </tr>
      `).join('');
    } catch (err) {
      console.error('Load rooms error:', err);
    }
  }

  async function checkAvailability() {
    const checkIn      = document.getElementById('checkIn').value;
    const checkOut     = document.getElementById('checkOut').value;
    const roomTypeId   = document.getElementById('roomTypeFilter').value;
    const resultDiv    = document.getElementById('availabilityResult');

    if (!checkIn || !checkOut) {
      resultDiv.innerHTML = '<div class="alert alert-warning">Please select both dates.</div>';
      return;
    }

    let url = `${API}/api/rooms/availability?check_in_date=${checkIn}&check_out_date=${checkOut}`;
    if (roomTypeId) url += `&room_type_id=${roomTypeId}`;

    try {
      const res  = await fetch(url);
      const data = await res.json();

      if (!data.rooms || data.rooms.length === 0) {
        resultDiv.innerHTML = '<div class="alert alert-warning">No available rooms for selected dates.</div>';
        return;
      }

      resultDiv.innerHTML = `
        <div class="alert alert-success">${data.message} — ${data.nights} night(s)</div>
        <div class="row g-2">
          ${data.rooms.map(r => `
            <div class="col-md-3">
              <div class="card border-success">
                <div class="card-body p-3">
                  <h6 class="fw-bold">Room ${r.room_number}</h6>
                  <div class="text-muted small">${r.room_type} — Floor ${r.floor}</div>
                  <div class="text-muted small">${r.description}</div>
                  <div class="mt-2">
                    <span class="fw-bold text-success">₱${parseFloat(r.estimated_total).toLocaleString()}</span>
                    <span class="text-muted small"> total</span>
                  </div>
                  <div class="text-muted small">₱${parseFloat(r.base_price).toLocaleString()}/night</div>
                </div>
              </div>
            </div>
          `).join('')}
        </div>
      `;
    } catch (err) {
      resultDiv.innerHTML = '<div class="alert alert-danger">Error checking availability.</div>';
    }
  }

  async function addRoom() {
    const room_number  = document.getElementById('roomNumber').value;
    const room_type_id = document.getElementById('roomType').value;
    const floor        = document.getElementById('floor').value;
    const msgDiv       = document.getElementById('addRoomMsg');

    if (!room_number || !floor) {
      msgDiv.innerHTML = '<div class="alert alert-warning">Please fill in all fields.</div>';
      return;
    }

    try {
      const res  = await fetch(`${API}/api/rooms`, {
        method:  'POST',
        headers: {
          'Content-Type':  'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ room_number, room_type_id, floor })
      });
      const data = await res.json();

      if (res.ok) {
        msgDiv.innerHTML = '<div class="alert alert-success">Room added successfully.</div>';
        document.getElementById('roomNumber').value = '';
        document.getElementById('floor').value      = '';
        loadRooms();
      } else {
        msgDiv.innerHTML = `<div class="alert alert-danger">${data.message}</div>`;
      }
    } catch (err) {
      msgDiv.innerHTML = '<div class="alert alert-danger">Server error.</div>';
    }
  }

  function openStatusModal(id, roomNumber, currentStatus) {
    selectedRoomId = id;
    document.getElementById('modalRoomNumber').textContent = roomNumber;
    document.getElementById('newStatus').value = currentStatus;
    new bootstrap.Modal(document.getElementById('statusModal')).show();
  }

  async function updateStatus() {
    const status = document.getElementById('newStatus').value;
    try {
      const res = await fetch(`${API}/api/rooms/${selectedRoomId}/status`, {
        method:  'PATCH',
        headers: {
          'Content-Type':  'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ status })
      });
      const data = await res.json();
      if (res.ok) {
        bootstrap.Modal.getInstance(
          document.getElementById('statusModal')
        ).hide();
        loadRooms();
      } else {
        alert(data.message);
      }
    } catch (err) {
      alert('Server error.');
    }
  }

  function getStatusColor(status) {
    const colors = {
      'Available':         'bg-success',
      'Occupied':          'bg-danger',
      'Under Maintenance': 'bg-warning text-dark'
    };
    return colors[status] || 'bg-secondary';
  }

  function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    window.location.href = 'login.html';
  }

  loadRooms();
</script>

</body>
</html>
