<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rooms - Hotel SPCF</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background-color: #f4f6fb; font-family: 'Segoe UI', sans-serif; }
    .sidebar {
      min-height: 100vh; width: 240px;
      background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      position: fixed; top: 0; left: 0; padding: 0; z-index: 100;
    }
    .sidebar-brand { padding: 28px 24px; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .sidebar-brand h4 { color: white; font-weight: 700; font-size: 1.1rem; }
    .sidebar-brand p { color: rgba(255,255,255,0.4); font-size: 0.75rem; margin: 0; }
    .sidebar-menu { padding: 20px 0; }
    .sidebar-menu a {
      display: block; padding: 12px 24px;
      color: rgba(255,255,255,0.6); text-decoration: none;
      font-size: 0.875rem; font-weight: 500;
      border-left: 3px solid transparent; transition: all 0.2s;
    }
    .sidebar-menu a:hover { color: white; background: rgba(255,255,255,0.05); border-left-color: rgba(255,255,255,0.3); }
    .sidebar-menu a.active { color: white; background: rgba(255,255,255,0.1); border-left-color: #4e9af1; }
    .sidebar-menu .menu-label { padding: 16px 24px 6px; color: rgba(255,255,255,0.25); font-size: 0.7rem; letter-spacing: 1px; text-transform: uppercase; }
    .sidebar-menu .divider { border-color: rgba(255,255,255,0.08); margin: 12px 24px; }
    .main-content { margin-left: 240px; min-height: 100vh; }
    .topbar { background: white; padding: 16px 32px; border-bottom: 1px solid #e8ecf0; display: flex; justify-content: space-between; align-items: center; }
    .topbar h5 { font-weight: 700; color: #1a1a2e; margin: 0; }
    .user-badge { background: #f0f4ff; color: #4e9af1; padding: 6px 16px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
    .content-area { padding: 28px 32px; }
    .section-title { font-size: 0.75rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #94a3b8; margin-bottom: 14px; margin-top: 28px; }
    .section-title:first-child { margin-top: 0; }
    .card-custom { background: white; border-radius: 14px; border: 1px solid #e8ecf0; overflow: hidden; }
    .card-custom .card-head { padding: 18px 22px; border-bottom: 1px solid #e8ecf0; display: flex; justify-content: space-between; align-items: center; }
    .card-custom .card-head h6 { font-weight: 700; color: #1a1a2e; margin: 0; font-size: 0.9rem; }
    .card-custom .card-body-custom { padding: 22px; }
    .form-label { font-size: 0.8rem; font-weight: 600; color: #475569; }
    .form-control, .form-select {
      border: 1.5px solid #e2e8f0; border-radius: 10px;
      padding: 10px 14px; font-size: 0.875rem; transition: border-color 0.2s;
    }
    .form-control:focus, .form-select:focus { border-color: #4e9af1; box-shadow: 0 0 0 3px rgba(78,154,241,0.1); }
    .btn-primary { background: #1a1a2e; border: none; border-radius: 10px; padding: 10px 20px; font-weight: 600; font-size: 0.875rem; }
    .btn-primary:hover { background: #0f3460; }
    .btn-success { border-radius: 10px; padding: 10px 20px; font-weight: 600; font-size: 0.875rem; }
    .table thead th { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #94a3b8; border: none; padding: 12px 20px; background: #f8fafc; }
    .table tbody td { padding: 14px 20px; font-size: 0.85rem; color: #334155; border-color: #f1f5f9; vertical-align: middle; }
    .badge-status { padding: 5px 12px; border-radius: 20px; font-size: 0.72rem; font-weight: 600; }
    .availability-card { background: white; border-radius: 12px; border: 1.5px solid #d1fae5; padding: 16px; }
    .availability-card h6 { font-weight: 700; color: #1a1a2e; }
  </style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-brand">
    <h4>Hotel SPCF</h4>
    <p></p>
  </div>
  <div class="sidebar-menu">
    <div class="menu-label">Main Menu</div>
    <a href="dashboard.html">Dashboard</a>
    <a href="rooms.html" class="active">Rooms</a>
    <a href="reservations.html">Reservations</a>
    <a href="payments.html">Payments</a>
    <hr class="divider">
    <a href="#" onclick="logout()">Logout</a>
  </div>
</div>

<div class="main-content">
  <div class="topbar">
    <h5>Room Management</h5>
    <span class="user-badge" id="welcomeMsg"></span>
  </div>
  <div class="content-area">

    <!-- Availability Search -->
    <div class="section-title">Check Availability</div>
    <div class="card-custom mb-4">
      <div class="card-head"><h6>Search Available Rooms</h6></div>
      <div class="card-body-custom">
        <div class="row g-3">
          <div class="col-md-3">
            <label class="form-label">Check In Date</label>
            <input type="date" id="checkIn" class="form-control">
          </div>
          <div class="col-md-3">
            <label class="form-label">Check Out Date</label>
            <input type="date" id="checkOut" class="form-control">
          </div>
          <div class="col-md-3">
            <label class="form-label">Room Type</label>
            <select id="roomTypeFilter" class="form-select">
              <option value="">All Types</option>
              <option value="1">Standard</option>
              <option value="2">Deluxe</option>
              <option value="3">Suite</option>
            </select>
          </div>
          <div class="col-md-3 d-flex align-items-end">
            <button onclick="checkAvailability()" class="btn btn-primary w-100">
              Search Rooms
            </button>
          </div>
        </div>
        <div id="availabilityResult" class="mt-3"></div>
      </div>
    </div>

    <!-- Add Room -->
    <div class="section-title" id="addRoomSection">Add Room</div>
    <div class="card-custom mb-4" id="addRoomCard">
      <div class="card-head"><h6>Add New Room</h6></div>
      <div class="card-body-custom">
        <div class="row g-3">
          <div class="col-md-3">
            <label class="form-label">Room Number</label>
            <input type="text" id="roomNumber" class="form-control" placeholder="e.g. 103">
          </div>
          <div class="col-md-3">
            <label class="form-label">Room Type</label>
            <select id="roomType" class="form-select">
              <option value="1">Standard</option>
              <option value="2">Deluxe</option>
              <option value="3">Suite</option>
            </select>
          </div>
          <div class="col-md-3">
            <label class="form-label">Floor</label>
            <input type="number" id="floor" class="form-control" placeholder="e.g. 1">
          </div>
          <div class="col-md-3 d-flex align-items-end">
            <button onclick="addRoom()" class="btn btn-success w-100">Add Room</button>
          </div>
        </div>
        <div id="addRoomMsg" class="mt-2"></div>
      </div>
    </div>

    <!-- All Rooms -->
    <div class="section-title">All Rooms</div>
    <div class="card-custom">
      <div class="card-head"><h6>Room Inventory</h6></div>
      <table class="table mb-0">
        <thead>
          <tr>
            <th>#</th>
            <th>Room</th>
            <th>Floor</th>
            <th>Type</th>
            <th>Price / Night</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="roomsTable">
          <tr><td colspan="7" class="text-center py-4 text-muted">Loading...</td></tr>
        </tbody>
      </table>
    </div>

  </div>
</div>

<!-- Status Modal -->
<div class="modal fade" id="statusModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content" style="border-radius:16px;border:none;">
      <div class="modal-header border-0 pb-0">
        <h6 class="modal-title fw-700">Update Room Status</h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p style="color:#64748b;font-size:0.85rem;">
          Room: <strong id="modalRoomNumber"></strong>
        </p>
        <label class="form-label">New Status</label>
        <select id="newStatus" class="form-select">
          <option value="Available">Available</option>
          <option value="Occupied">Occupied</option>
          <option value="Under Maintenance">Under Maintenance</option>
        </select>
      </div>
      <div class="modal-footer border-0">
        <button type="button" class="btn btn-secondary"
          data-bs-dismiss="modal"
          style="border-radius:10px;">Cancel</button>
        <button type="button" class="btn btn-primary"
          onclick="updateStatus()"
          style="border-radius:10px;">Update Status</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const API   = 'http://localhost:3000';
  const token = localStorage.getItem('token');
  const user  = JSON.parse(localStorage.getItem('user') || '{}');
  if (!token) window.location.href = 'login.html';

  document.getElementById('welcomeMsg').textContent = `${user.name} — ${user.role}`;
  if (user.role !== 'Admin') {
    document.getElementById('addRoomCard').style.display    = 'none';
    document.getElementById('addRoomSection').style.display = 'none';
  }

  let selectedRoomId = null;
  const today    = new Date().toISOString().split('T')[0];
  const tomorrow = new Date(Date.now() + 86400000).toISOString().split('T')[0];
  document.getElementById('checkIn').value  = today;
  document.getElementById('checkOut').value = tomorrow;

  async function loadRooms() {
    try {
      const res   = await fetch(`${API}/api/rooms`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const rooms = await res.json();
      const tbody = document.getElementById('roomsTable');

      if (rooms.length === 0) {
        tbody.innerHTML =
          '<tr><td colspan="7" class="text-center py-4 text-muted">No rooms found.</td></tr>';
        return;
      }

      tbody.innerHTML = rooms.map(r => `
        <tr>
          <td style="color:#94a3b8;font-weight:600;">${r.id}</td>
          <td><strong>${r.room_number}</strong></td>
          <td>Floor ${r.floor}</td>
          <td style="color:#64748b;">${r.room_type}</td>
          <td><strong>₱${parseFloat(r.base_price).toLocaleString()}</strong></td>
          <td>
            <span class="badge-status" style="${getStatusStyle(r.status)}">
              ${r.status}
            </span>
          </td>
          <td>
            <button class="btn btn-sm"
              style="border-radius:8px;border:1.5px solid #e2e8f0;
                     font-size:0.78rem;padding:5px 12px;"
              onclick="openStatusModal(${r.id},'${r.room_number}','${r.status}')">
              Update
            </button>
          </td>
        </tr>
      `).join('');
    } catch (err) {
      console.error(err);
    }
  }

  async function checkAvailability() {
    const checkIn    = document.getElementById('checkIn').value;
    const checkOut   = document.getElementById('checkOut').value;
    const roomTypeId = document.getElementById('roomTypeFilter').value;
    const resultDiv  = document.getElementById('availabilityResult');

    if (!checkIn || !checkOut) {
      resultDiv.innerHTML =
        '<div class="alert alert-warning" style="border-radius:10px;">Please select both dates.</div>';
      return;
    }

    let url = `${API}/api/rooms/availability?check_in_date=${checkIn}&check_out_date=${checkOut}`;
    if (roomTypeId) url += `&room_type_id=${roomTypeId}`;

    try {
      const res  = await fetch(url);
      const data = await res.json();

      if (!data.rooms || data.rooms.length === 0) {
        resultDiv.innerHTML =
          '<div class="alert alert-warning" style="border-radius:10px;">No available rooms for selected dates.</div>';
        return;
      }

      resultDiv.innerHTML = `
        <div class="alert alert-success" style="border-radius:10px;">
          ${data.message} — ${data.nights} night(s)
        </div>
        <div class="row g-2">
          ${data.rooms.map(r => `
            <div class="col-md-3">
              <div class="availability-card">
                <h6>Room ${r.room_number}</h6>
                <div style="color:#64748b;font-size:0.8rem;">
                  ${r.room_type} — Floor ${r.floor}
                </div>
                <div style="color:#64748b;font-size:0.78rem;margin-top:4px;">
                  ${r.description}
                </div>
                <div style="margin-top:10px;">
                  <span style="font-weight:700;color:#16a34a;font-size:1rem;">
                    ₱${parseFloat(r.estimated_total).toLocaleString()}
                  </span>
                  <span style="color:#94a3b8;font-size:0.75rem;"> total</span>
                </div>
                <div style="color:#94a3b8;font-size:0.75rem;">
                  ₱${parseFloat(r.base_price).toLocaleString()}/night
                </div>
              </div>
            </div>
          `).join('')}
        </div>
      `;
    } catch (err) {
      resultDiv.innerHTML =
        '<div class="alert alert-danger" style="border-radius:10px;">Error checking availability.</div>';
    }
  }

  async function addRoom() {
    const room_number  = document.getElementById('roomNumber').value;
    const room_type_id = document.getElementById('roomType').value;
    const floor        = document.getElementById('floor').value;
    const msgDiv       = document.getElementById('addRoomMsg');

    if (!room_number || !floor) {
      msgDiv.innerHTML =
        '<div class="alert alert-warning" style="border-radius:10px;">Please fill in all fields.</div>';
      return;
    }

    try {
      const res  = await fetch(`${API}/api/rooms`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body:    JSON.stringify({ room_number, room_type_id, floor })
      });
      const data = await res.json();
      if (res.ok) {
        msgDiv.innerHTML =
          '<div class="alert alert-success" style="border-radius:10px;">Room added successfully.</div>';
        document.getElementById('roomNumber').value = '';
        document.getElementById('floor').value      = '';
        loadRooms();
      } else {
        msgDiv.innerHTML =
          `<div class="alert alert-danger" style="border-radius:10px;">${data.message}</div>`;
      }
    } catch (err) {
      msgDiv.innerHTML =
        '<div class="alert alert-danger" style="border-radius:10px;">Server error.</div>';
    }
  }

  function openStatusModal(id, roomNumber, currentStatus) {
    selectedRoomId = id;
    document.getElementById('modalRoomNumber').textContent = roomNumber;
    document.getElementById('newStatus').value = currentStatus;
    new bootstrap.Modal(document.getElementById('statusModal')).show();
  }

  async function updateStatus() {
    const status = document.getElementById('newStatus').value;
    try {
      const res = await fetch(`${API}/api/rooms/${selectedRoomId}/status`, {
        method:  'PATCH',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body:    JSON.stringify({ status })
      });
      if (res.ok) {
        bootstrap.Modal.getInstance(document.getElementById('statusModal')).hide();
        loadRooms();
      }
    } catch (err) { alert('Server error.'); }
  }

  function getStatusStyle(status) {
    const styles = {
      'Available':         'background:#f0fdf4;color:#16a34a;',
      'Occupied':          'background:#fef2f2;color:#dc2626;',
      'Under Maintenance': 'background:#fff7ed;color:#ea580c;'
    };
    return styles[status] || 'background:#f8fafc;color:#64748b;';
  }

  function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    window.location.href = 'login.html';
  }

  loadRooms();
</script>
</body>
</html>
